<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MacroDash — Research Terminal</title>

  <!-- Favicon (logo MacroDash) — query string força cache bust -->
  <link rel="icon"          type="image/png" href="favicon.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon.png?v=2" />
  <link rel="shortcut icon" href="favicon.png?v=2" />

  <!-- Open Graph (preview ao compartilhar link em redes sociais) -->
  <meta property="og:title"       content="MacroDash — Dashboard Macroeconômico" />
  <meta property="og:description" content="Terminal de pesquisa macroeconômica para Brasil e USA. 300+ indicadores em tempo real via FRED + BACEN." />
  <meta property="og:image"       content="favicon.png?v=2" />
  <meta property="og:type"        content="website" />
  <meta name="theme-color"        content="#000000" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500;1,600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Chart.js + plugins -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <!-- SheetJS — XLSX/CSV parsing for ISM bulk import -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Local secrets (gitignored) — must load BEFORE app code -->
  <script src="js/secrets.local.js"></script>
</head>
<body>

<!-- ─── Header ─────────────────────────────────────────────────── -->
<header>
  <div class="brand">
    <div class="brand-tag">RESEARCH TERMINAL · MACRO</div>
    <div class="brand-logo">Macro<em>Dash</em></div>
  </div>

  <div class="header-controls">

    <!-- Country -->
    <div class="seg country-toggle">
      <button class="active" data-country="usa">USA</button>
      <button data-country="brazil">Brasil</button>
    </div>

    <!-- View mode: Charts | Tables -->
    <div class="seg view-toggle">
      <button class="active" data-view="charts">Gráficos</button>
      <button data-view="tables">Tabelas</button>
    </div>

    <!-- Time range -->
    <div class="seg range-select">
      <button data-range="1y">1Y</button>
      <button data-range="2y">2Y</button>
      <button data-range="3y" class="active">3Y</button>
      <button data-range="5y">5Y</button>
      <button data-range="10y">10Y</button>
      <button data-range="max">Max</button>
    </div>

    <button class="btn-refresh" id="btn-refresh">↺ Atualizar</button>

    <span id="last-updated"></span>
  </div>
</header>

<!-- ─── Editorial metadata bar ─────────────────────────────────── -->
<div class="meta-bar">
  <div class="meta-cell"><span class="meta-label">FONTE USA</span><span class="meta-value">FRED · Federal Reserve</span></div>
  <div class="meta-cell"><span class="meta-label">FONTE BRASIL</span><span class="meta-value">BACEN SGS</span></div>
  <div class="meta-cell"><span class="meta-label">PERÍODO</span><span class="meta-value" id="meta-period">3 anos</span></div>
</div>

<!-- ─── Layout ─────────────────────────────────────────────────── -->
<div class="layout">

  <aside id="sidebar"></aside>

  <main>
    <div class="error-banner" id="error-banner"></div>

    <div class="loading-overlay" id="loading-section" style="display:none">
      <div class="spinner"></div>
      <div id="loading-progress">Carregando séries…</div>
    </div>

    <div id="tab-content-area"></div>
  </main>

</div>

<!-- Scripts -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/heatmap.js"></script>
<script src="js/charts.js"></script>
<script src="js/tradingview.js"></script>
<script src="js/ism-manual.js"></script>
<script src="js/app.js"></script>

</body>
</html>
